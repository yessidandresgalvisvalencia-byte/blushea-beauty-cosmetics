<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Carrito | Blushéa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <h1>BLUSHÉA</h1>
    <span>Beauty Cosmetics</span>
  </div>

  <nav class="nav">
    <a href="/">Inicio</a>
    <a href="/#productos">Productos</a>
  </nav>
</header>

<main class="cart-page">
  <h2>Mis productos</h2>

  <div id="listaCarrito"></div>

  <section class="cart-form">
    <h3>Datos de entrega</h3>

    <input id="nombreCliente" type="text" placeholder="Nombre completo">
    <input id="telefonoCliente" type="text" placeholder="Teléfono">
    <input id="direccionCliente" type="text" placeholder="Dirección">
    <input id="barrioCliente" type="text" placeholder="Barrio">

    <button id="calcularCarritoEnvio">Calcular envío</button>

    <div id="resumenCarrito"></div>

    <button id="confirmarPedido" class="buy-detail-button">
      Confirmar pedido
    </button>
  </section>
</main>

<script src="carrito.js"></script>
</body>
</html>
